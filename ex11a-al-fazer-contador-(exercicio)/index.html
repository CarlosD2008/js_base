<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>


    // 1ª Digitação (Resolva aqui o exercício)
  let tempo = 0;
  let contador = null;

  const timer = document.getElementById("timer");  // Constante busca os dados do HTML.
  const startButton = document.getElementById("startButton");  
  const pauseButton = document.getElementById("pauseButton");
  const resetButton = document.getElementById("resetButton");

  // Iniciar
  startButton.addEventListener("click", function() { // Responsavel pelo click.

  if (contador !== null) return;

  contador = setInterval(function() {
    tempo++; // Seguir a sequencia de segundos.
    timer.textContent = tempo; // Mostra o novo valor na tela.
  }, 1000); // Intervalo a cada 1s.

});

  // Pausar
  pauseButton.addEventListener("click", function() { // Quando clicar no botão pause, executa essa função.
  clearInterval(contador);
  contador = null; // Limpa o estado do contador.
});

  // Resetar
  resetButton.addEventListener("click", function() {
  clearInterval(contador);
  contador = null;
  tempo = 0;
  timer.textContent = tempo; // Atualiza a tela mostrando 0 novamente.
});


  </script>
</body>
</html>
